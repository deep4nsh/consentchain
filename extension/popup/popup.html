<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary: #3b82f6;
      --secondary: #8b5cf6;
      --bg: #0a0a0c;
      --card: #16161a;
      --text: #ffffff;
      --muted: #94a3b8;
    }

    body {
      width: 340px;
      margin: 0;
      padding: 24px;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Inter", sans-serif;
      overflow: hidden;
    }

    .glass-bg {
        position: absolute;
        top: -50px;
        right: -50px;
        width: 150px;
        height: 150px;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
        pointer-events: none;
        z-index: -1;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .icon-container {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.2);
    }

    .title-area h1 {
      font-size: 18px;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.01em;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title-area p {
      font-size: 10px;
      color: var(--primary);
      margin: 0;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.15em;
    }

    .status-card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
      position: relative;
    }

    .status-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }

    .status-value {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pulse {
      width: 10px;
      height: 10px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 14px;
      color: #fff;
      font-size: 12px;
      font-family: "JetBrains Mono", monospace;
      outline: none;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .balance-area {
        margin-top: 12px;
        font-size: 11px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
    }

    .btn {
      width: 100%;
      background: #ffffff;
      color: #000000;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .btn:hover {
      background: #f1f5f9;
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .secondary-btn {
        width: 100%;
        background: transparent;
        color: var(--muted);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 14px;
        padding: 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: block;
        text-align: center;
        box-sizing: border-box;
    }

    .secondary-btn:hover {
        background: rgba(255,255,255,0.05);
        color: #fff;
    }

    .footer {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      margin-top: 28px;
      opacity: 0.6;
    }

    .success-msg {
      color: #10b981;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      margin-top: 12px;
      height: 16px;
      opacity: 0;
      transform: translateY(5px);
      transition: all 0.3s;
    }

    .success-msg.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="glass-bg"></div>
  
  <div class="header">
    <div class="icon-container">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
    </div>
    <div class="title-area">
      <h1>Sentinel V2</h1>
      <p>Precision Protocol</p>
    </div>
  </div>

  <div class="status-card">
    <div class="status-label">
        <span>Network Status</span>
        <span id="balance-badge">-- ALGO</span>
    </div>
    <div class="status-value">
      <div class="pulse"></div>
      Algorand Testnet Active
    </div>
  </div>

  <div class="input-group">
    <label for="address">Wallet Identity</label>
    <input type="text" id="address" placeholder="Paste Wallet Address..." />
    <div class="balance-area">
        <span>Last Synced: <span id="sync-time">Never</span></span>
    </div>
  </div>

  <button id="save" class="btn">Update Identity</button>
  <a href="https://consentchain-vert.vercel.app/dashboard" target="_blank" class="secondary-btn">Open Dashboard</a>
  
  <div id="msg" class="success-msg">Success: Local Identity Synced.</div>

  <div id="active-site-card" class="status-card" style="display: none; border-color: rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.05); margin-top: 8px;">
    <div class="status-label">
        <span style="color: #ef4444;">Active Portal Detection</span>
        <span id="site-org-id" style="font-family: monospace; opacity: 0.8;">--</span>
    </div>
    <div id="site-status-text" class="status-value" style="font-size: 13px; margin-bottom: 16px;">
      Checking site permissions...
    </div>
    <button id="revoke-btn" class="btn" style="background: #ef4444; color: white; margin-bottom: 0; font-size: 12px; padding: 10px; display: none;">
        Revoke Site Access
    </button>
  </div>

  <div class="footer">
    Verified by ConsentChain Protocol Core
  </div>

  <script src="popup.js"></script>
</body>
</html>
